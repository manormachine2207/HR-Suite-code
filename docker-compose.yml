# HR-Suite Development Stack
# - postgres: application + (later) flowable schemas
# - minio:    S3-compatible object storage (form attachments)
# - mailpit:  SMTP sink + web UI for outbound mail testing
#
# Frontend `app` service serves the Angular/Oblique SPA on http://localhost:8080
# (per FCT2 + FCT3, ADR-006 Multi-Stage build + nginx-unprivileged runtime).
# The `backend` service runs the Spring Boot application (core/tenant);
# Liquibase migrations run in-process on startup per ADR-006. The file
# mirrors the future Helm chart topology 1:1 (BDR-007, Compose-Helm-
# Symmetrie). The frontend `app` calls the backend at :8081 in dev.
#
# An OIDC IdP stub (dex) will be added once the identity-sp module starts.
# Until then, authentication is mocked at the application layer.

name: hr-suite-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrsuite-postgres
    environment:
      POSTGRES_DB: hrsuite
      POSTGRES_USER: hrsuite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      # Password for the restricted runtime role created by the init script below.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Provisions the NOSUPERUSER 'hrsuite_app' role on first init so RLS is
      # actually enforced (ADR-008): superusers bypass RLS regardless of FORCE.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrsuite -d hrsuite"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hrsuite-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hrsuite}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devdevdev}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: hrsuite-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  app:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: hr-suite-frontend:dev
    container_name: hrsuite-app
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: application/Dockerfile
    image: hr-suite-application:dev
    container_name: hrsuite-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/hrsuite
      # Connect as the restricted, non-superuser role (ADR-008 RLS), NOT the
      # bootstrap superuser 'hrsuite' — superuser/BYPASSRLS roles bypass RLS.
      DB_USERNAME: hrsuite_app
      DB_PASSWORD: ${APP_DB_PASSWORD:-dev}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:1.70.0
    container_name: hrsuite-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-dev}
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: Europe/Zurich
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  n8n-data:
