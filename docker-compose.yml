# HR-Suite Development Stack
# - postgres: application + (later) flowable schemas
# - minio:    S3-compatible object storage (form attachments)
# - mailpit:  SMTP sink + web UI for outbound mail testing
#
# Frontend `app` service serves the Angular/Oblique SPA on http://localhost:8080
# (per FCT2 + FCT3, ADR-006 Multi-Stage build + nginx-unprivileged runtime).
# The Liquibase init service and backend application service still wait
# for the first deployable backend module per ADR-006 + BDR-007 (Container-
# First, Compose-Helm-Symmetrie). The file mirrors the future Helm chart
# topology 1:1.
#
# An OIDC IdP stub (dex) will be added once the identity-sp module starts.
# Until then, authentication is mocked at the application layer.

name: hr-suite-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrsuite-postgres
    environment:
      POSTGRES_DB: hrsuite
      POSTGRES_USER: hrsuite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrsuite -d hrsuite"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hrsuite-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hrsuite}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devdevdev}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: hrsuite-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  app:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: hr-suite-frontend:dev
    container_name: hrsuite-app
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
