server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/wasm image/svg+xml;

    # Healthcheck for Docker + future K8s probes
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 "ok\n";
    }

    # Long-cache for fingerprinted Angular build assets
    # Security headers MUST be repeated here: any `add_header` in a location
    # block disables inheritance from outer scopes (nginx quirk).
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "0" always;
        try_files $uri =404;
    }

    # Runtime config must NEVER be cached (security-headers repeated)
    location = /assets/config/runtime.json {
        expires 0;
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "0" always;
        try_files $uri =404;
    }

    # SPA-Fallback for Angular router (security-headers repeated)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "0" always;
    }
}
