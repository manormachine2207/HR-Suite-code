server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP comes with backend integration cut)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/wasm image/svg+xml;

    # Healthcheck for Docker + future K8s probes
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 "ok\n";
    }

    # Long-cache for fingerprinted Angular build assets
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Runtime config must NEVER be cached
    location = /assets/config/runtime.json {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    # SPA-Fallback for Angular router
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
