spring:
  application:
    name: hr-suite
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrsuite}
    username: ${DB_USERNAME:hrsuite}
    password: ${DB_PASSWORD:dev}
    hikari:
      # ADR-008: clears session-level app.tenant_id when a connection returns to the pool.
      connection-test-query: "RESET ALL; SELECT 1;"
  jpa:
    hibernate:
      ddl-auto: validate   # Liquibase owns the schema; Hibernate only validates entity<->table drift.
    open-in-view: false
    properties:
      hibernate.format_sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  # Prod supplies OIDC_ISSUER_URI; dev uses the mock JwtDecoder bean (DevSecurityConfig).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
