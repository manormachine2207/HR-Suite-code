spring:
  application:
    name: hr-suite
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hrsuite}
    # Default to the restricted, non-superuser role so a bare-defaults run fails
    # loudly (role missing) rather than silently connecting as a superuser and
    # bypassing RLS (ADR-008). All real paths override DB_USERNAME: compose, prod
    # secrets, and the ITs via @DynamicPropertySource.
    username: ${DB_USERNAME:hrsuite_app}
    password: ${DB_PASSWORD:dev}
    # NOTE (ADR-008): intentionally NO Hikari connection-test-query here.
    # The per-connection reset of the session GUC app.tenant_id will be done
    # by TenantContextAspect (clear-after-use) once the first tenant-scoped
    # table + RLS land. It must NOT be smuggled into connection-test-query:
    # Spring Boot's actuator DataSourceHealthIndicator reuses that query as its
    # liveness/readiness DB probe and runs it through JdbcTemplate, which
    # requires a ResultSet. A leading "RESET ALL" returns none, which throws
    # and forces the db health contributor (hence readiness) DOWN. With no
    # custom query, Hikari validates via JDBC4 isValid() and the actuator probe
    # falls back to a plain "SELECT 1" — both green.
  jpa:
    hibernate:
      ddl-auto: validate   # Liquibase owns the schema; Hibernate only validates entity<->table drift.
    open-in-view: false
    properties:
      hibernate.format_sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  # Prod supplies OIDC_ISSUER_URI; dev uses the mock JwtDecoder bean (DevSecurityConfig).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
